<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Certificate Preview</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* FIRST SCREEN */
#certificateView{
    position:fixed;
    inset:0;
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
}

#certificateView img{
    max-width:95%;
    max-height:95vh;
}

/* SECOND SCREEN */
#printView{
    display:none;
    min-height:100vh;
    background:#d8d8d8;
}

/* TOP BAR */
.topbar{
    background:#00acc1;
    color:#fff;
    padding:20px;
}

.topbar .title{
    font-size:20px;
    margin-bottom:15px;
}

.topbar .options{
    display:flex;
    gap:30px;
    font-size:18px;
}

/* PAPER AREA */
.paper-wrapper{
    display:flex;
    justify-content:center;
    padding:40px 0;
}

.paper{
    width:80%;
    max-width:700px;
    background:#fff;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.25);
}

.paper img{
    width:100%;
    display:block;
}

/* FOOTER */
.footer{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#a9a9a9;
    color:white;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
}

.check{
    position:absolute;
    right:20px;
    font-size:28px;
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="certificateView">
    <img src="ustaz.jpg" alt="Certificate">
</div>

<!-- SCREEN 2 -->
<div id="printView">

    <div class="topbar">
        <div class="title">
            Select a printer ▼
        </div>

        <div class="options">
            <span>Copies: 01</span>
            <span>Paper size: Letter</span>
        </div>
    </div>

    <div class="paper-wrapper">
        <div class="paper">
            <img src="ustaz.jpg" alt="Certificate">
        </div>
    </div>

    <div class="footer">
        1/1
        <span class="check">✓</span>
    </div>

</div>

<script>
setTimeout(function(){

    document.getElementById("certificateView").style.display = "none";

    document.getElementById("printView").style.display = "block";

}, 5000); // Show certificate for 5 seconds

</script>

</body>
</html>
